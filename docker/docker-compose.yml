version: '3.9'

services:
  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ugram-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ugram_health}
      POSTGRES_USER: ${POSTGRES_USER:-ugram}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ugram} -d ${POSTGRES_DB:-ugram_health}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible Object Storage) ──────────────────
  minio:
    image: minio/minio:latest
    container_name: ugram-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ugram-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-dev_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO Init (create buckets on first run) ──────────────
  minio-init:
    image: minio/mc:latest
    container_name: ugram-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set ugram http://minio:9000 $${MINIO_ROOT_USER:-ugram-admin} $${MINIO_ROOT_PASSWORD:-dev_password};
        mc mb --ignore-existing ugram/ugram-files;
        mc mb --ignore-existing ugram/ugram-lab-reports;
        mc mb --ignore-existing ugram/ugram-dicom;
        mc anonymous set download ugram/ugram-lab-reports;
        echo 'MinIO buckets initialized.';
      "

  # ── Spring Boot Application ──────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ugram-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: ${SERVER_PORT:-8080}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ugram_health}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ugram}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-ugram-admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-dev_password}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-ugram-files}
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-change-in-production-must-be-at-least-64-chars-long-for-hs512}
      JWT_ACCESS_EXPIRATION_MS: ${JWT_ACCESS_EXPIRATION_MS:-900000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    ports:
      - "${SERVER_PORT:-8080}:8080"

volumes:
  pgdata:
    driver: local
  minio-data:
    driver: local
