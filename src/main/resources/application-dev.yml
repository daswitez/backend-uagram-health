# ═══════════════════════════════════════════════════════════
# Ugram Health — Development Profile
# ═══════════════════════════════════════════════════════════

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ugram_health}
    username: ${SPRING_DATASOURCE_USERNAME:ugram}
    password: ${SPRING_DATASOURCE_PASSWORD:dev_password}
    hikari:
      maximum-pool-size: 5

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    bo.edu.uagrm.ugram: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
