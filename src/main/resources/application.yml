# ═══════════════════════════════════════════════════════════
# Ugram Health — Application Configuration
# ═══════════════════════════════════════════════════════════

spring:
  application:
    name: ugram-health-backend

  # ── JPA / Hibernate ───────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate

    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: America/La_Paz

  # ── Mail / SMTP ──────────────────────────────────────────
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true       # Reject non-TLS connections
          ssl:
            trust: smtp.gmail.com  # Required by Jakarta Mail to trust Gmail's cert
          connectiontimeout: 5000
          timeout: 10000
          writetimeout: 10000

  # ── Flyway Migrations ────────────────────────────────────
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # ── Jackson ───────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: America/La_Paz

# ── Server ──────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

# ── JWT Configuration ───────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:super-secret-key-change-in-production-must-be-at-least-64-chars-long-for-hs512}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
    issuer: ugram-health

  # ── MinIO Configuration ──────────────────────────────────
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:ugram-admin}
    secret-key: ${MINIO_SECRET_KEY:dev_password}
    bucket-name: ${MINIO_BUCKET_NAME:ugram-files}

  # ── CORS Configuration ──────────────────────────────────
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://ugram-health-a5uu6r69i-daswitezs-projects.vercel.app,https://ugram-health-web.vercel.app,https://ugram-health-web-git-produccion-daswitezs-projects.vercel.app}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    max-age: 3600
